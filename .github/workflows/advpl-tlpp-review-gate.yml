name: AdvPL/TLPP PR Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: Critical policy gate
    runs-on: ubuntu-latest
    steps:
      - name: Scan PR diff for critical AdvPL/TLPP risks
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const findings = [];
            const criticalRules = [
              { pattern: /\bStaticCall\s*\(/i, message: 'StaticCall is not allowed in TLPP sources.' },
              { pattern: /\bConOut\s*\(/i, message: 'ConOut should be replaced with FWLogMsg.' },
              { pattern: /\bOutErr\s*\(/i, message: 'OutErr should be replaced with FWLogMsg.' },
              { pattern: /\bIIF\s*\(/i, message: 'IIF should be replaced with If/Else/EndIf.' }
            ];

            for (const file of files) {
              const patch = file.patch || '';
              if (!patch) {
                continue;
              }

              // Only scan AdvPL/TLPP source files (.prw, .prx, .tlpp)
              const isLegacySource = file.filename.endsWith('.prw') || file.filename.endsWith('.prx');
              const isTlppSource = file.filename.endsWith('.tlpp');
              const isAdvplOrTlppSource = isLegacySource || isTlppSource;

              if (!isAdvplOrTlppSource) {
                continue;
              }

              if (isLegacySource && /^\+\s*#include\s+"tlpp-core\.th"/mi.test(patch)) {
                findings.push(`${file.filename}: tlpp-core.th must not be added to .prw or .prx files.`);
              }

              if (isTlppSource && file.status !== 'removed') {
                const source = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: file.filename,
                  ref: pr.head.sha
                });

                const content = Buffer.from(source.data.content, 'base64').toString('utf8');
                if (!/^\s*#include\s+"tlpp-core\.th"/mi.test(content)) {
                  findings.push(`${file.filename}: TLPP sources should include tlpp-core.th.`);
                }
              }

              for (const rule of criticalRules) {
                if (rule.pattern.test(patch)) {
                  findings.push(`${file.filename}: ${rule.message}`);
                }
              }
            }

            if (findings.length > 0) {
              core.setFailed(`Critical policy issues found:\n- ${findings.join('\n- ')}`);
              return;
            }

            core.info('No critical policy violations found.');
      - name: Summarize review gate
        run: |
          echo "Copilot review is advisory in GitHub today."
          echo "CODEOWNERS makes the tech lead review required."
          echo "This workflow blocks only critical AdvPL/TLPP policy issues."
